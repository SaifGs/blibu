<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#d4f3e8">
<title>Bibu</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #d4f3e8; font-family: "Fredoka One", cursive; touch-action: none; }
  .app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at 25% 20%, #b8eeda, transparent 55%), radial-gradient(ellipse at 75% 85%, #a8e4f0, transparent 55%), #d4f3e8; position: relative; overflow: hidden; }
  /* Weltall-Hintergrund */
  .night-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(30,10,70,.7), transparent 48%), radial-gradient(ellipse at 82% 15%, rgba(10,30,80,.6), transparent 45%), radial-gradient(ellipse at 55% 85%, rgba(0,40,60,.5), transparent 50%), #020509; opacity: 0; transition: opacity 1.4s ease-in-out; pointer-events: none; overflow: hidden; }
  .app.night .night-bg { opacity: 1; }
  .night-moon { position: absolute; top: 7%; right: 14%; width: 58px; height: 58px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fffef5, #f0e060 60%, #d4c030); box-shadow: 0 0 14px rgba(240,224,96,.7), 0 0 40px rgba(240,224,96,.3), 0 0 90px rgba(240,224,96,.12); }
  .night-star { position: absolute; border-radius: 50%; background: white; animation: twinkle 3s ease-in-out infinite; }
  .night-star.bright { background: #e8f4ff; box-shadow: 0 0 4px rgba(200,220,255,.9); }
  @keyframes twinkle { 0%,100%{opacity:.95;transform:scale(1)} 50%{opacity:.15;transform:scale(.4)} }
  .char { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; flex: 1; width: 100%; position: relative; }
  .bsvg { height: min(72vh, 460px); width: auto; filter: drop-shadow(0 10px 30px rgba(13,80,65,.2)); animation: bob 2.6s ease-in-out infinite; transform-origin: center bottom; }
  .bsvg.happy     { animation: wig .45s ease-in-out 3, bob 2.6s ease-in-out .45s infinite; }
  .bsvg.thinking  { animation: thk 1.8s ease-in-out infinite; }
  .bsvg.listening { animation: lst 1s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)}      50%{transform:translateY(-12px)} }
  @keyframes wig { 0%{transform:rotate(0)} 25%{transform:rotate(-11deg) scale(1.1)} 75%{transform:rotate(11deg) scale(1.1)} 100%{transform:rotate(0)} }
  @keyframes thk { 0%,100%{transform:rotate(-4deg)}       50%{transform:rotate(4deg) translateY(-7px)} }
  @keyframes lst { 0%,100%{transform:scale(1)}            50%{transform:scale(1.04)} }
  .bsvg.schlaf { animation: schlaf 4s ease-in-out infinite; }
  @keyframes schlaf { 0%,100%{transform:translateY(0) rotate(-.8deg)} 50%{transform:translateY(-5px) rotate(.8deg)} }
  .eyelid { opacity: 0; transition: opacity .4s; }
  .bsvg.schlaf .eyelid { opacity: 1; }
  #pl, #pr { transition: opacity .4s; }
  .bsvg.schlaf #pl, .bsvg.schlaf #pr { opacity: 0; }
  .sleep-wrap { position: absolute; bottom: 1.8rem; }
  .sleep-btn { width: 88px; height: 88px; border-radius: 50%; background: #1D9E75; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 28px rgba(29,158,117,.45); transition: transform .12s, background .35s, box-shadow .35s; }
  .sleep-btn:active { transform: scale(.91); }
  .sleep-btn svg { width: 40px; height: 40px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .talk-pill { font-size: clamp(.78rem,2.2vw,.96rem); padding: 5px 20px; border-radius: 20px; color: white; opacity: 0; transition: opacity .35s; pointer-events: none; min-height: 1.9em; display: flex; align-items: center; justify-content: center; }
  .talk-pill.luis      { opacity: 1; background: rgba(226,75,74,.88); }
  .talk-pill.blibu     { opacity: 1; background: rgba(239,159,39,.88); }
  .talk-pill.connected { opacity: 1; background: rgba(29,158,117,.82); }
  .talk-pill.error     { opacity: 1; background: rgba(180,30,30,.92); }

  /* Akrobatik-Animationen */
  .bsvg.acro-sprung     { animation: acro-sprung     0.85s ease-in-out; }
  .bsvg.acro-purzelbaum { animation: acro-purzelbaum 0.9s  ease-in-out; transform-origin: center center; }
  .bsvg.acro-radschlag  { animation: acro-radschlag  0.8s  ease-in-out; transform-origin: center center; }
  .bsvg.acro-stern      { animation: acro-stern      0.75s ease-in-out; transform-origin: center center; }

  @keyframes acro-sprung {
    0%   { transform: translateY(0)     scaleY(1)    scaleX(1); }
    8%   { transform: translateY(0)     scaleY(.75)  scaleX(1.25); }
    35%  { transform: translateY(-160px) scaleY(1.1)  scaleX(.95); }
    65%  { transform: translateY(-160px) scaleY(1.1)  scaleX(.95); }
    80%  { transform: translateY(0)     scaleY(.72)  scaleX(1.28); }
    92%  { transform: translateY(-22px) scaleY(1.04) scaleX(.98); }
    100% { transform: translateY(0)     scaleY(1)    scaleX(1); }
  }
  @keyframes acro-purzelbaum {
    0%   { transform: rotate(0deg)   translateY(0); }
    30%  { transform: rotate(180deg) translateY(-50px); }
    60%  { transform: rotate(360deg) translateY(0); }
    78%  { transform: rotate(360deg) translateY(-18px); }
    100% { transform: rotate(360deg) translateY(0); }
  }
  @keyframes acro-radschlag {
    0%   { transform: rotateY(0deg)   translateX(0); }
    25%  { transform: rotateY(90deg)  translateX(25px); }
    50%  { transform: rotateY(180deg) translateX(0); }
    75%  { transform: rotateY(270deg) translateX(-25px); }
    100% { transform: rotateY(360deg) translateX(0); }
  }
  @keyframes acro-stern {
    0%,100% { transform: scale(1)   rotate(0deg); }
    20%     { transform: scale(1.3) rotate(90deg); }
    40%     { transform: scale(.8)  rotate(180deg); }
    60%     { transform: scale(1.3) rotate(270deg); }
    80%     { transform: scale(.85) rotate(340deg); }
  }
  .char-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .char-ring { position: absolute; width: min(58vw, 350px); height: min(58vw, 350px); border-radius: 50%; border: 2.5px solid #E24B4A; opacity: 0; }
  .char-rings.show .char-ring { animation: ring 1.6s ease-out infinite; }
  .char-rings.show .char-ring:nth-child(2) { animation-delay: .53s; }
  .char-rings.show .char-ring:nth-child(3) { animation-delay: 1.06s; }
  @keyframes ring { 0%{transform:scale(.72);opacity:.7} 100%{transform:scale(1.55);opacity:0} }
  .zzz-wrap { position: absolute; right: calc(50% - 118px); bottom: 56%; pointer-events: none; opacity: 0; transition: opacity .6s; }
  .zzz-wrap.show { opacity: 1; }
  .z { position: absolute; font-family: "Fredoka One", cursive; color: #085041; opacity: 0; }
  .z1 { font-size: 1.5rem; left: 0;    bottom: 0;    animation: zfloat 3.2s ease-out 0s   infinite; }
  .z2 { font-size: 2.1rem; left: 12px; bottom: 10px; animation: zfloat 3.2s ease-out 1.1s infinite; }
  .z3 { font-size: 1.1rem; left: 30px; bottom: 2px;  animation: zfloat 3.2s ease-out 2.2s infinite; }
  @keyframes zfloat { 0%{transform:translate(0,0) rotate(-10deg);opacity:0} 18%{opacity:.9} 100%{transform:translate(20px,-70px) rotate(15deg);opacity:0} }

  /* Papa Setup Overlay */
  .overlay { position: fixed; inset: 0; z-index: 100; background: rgba(8,80,65,.94); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); overflow-y: auto; padding: 1rem; }
  .overlay.hidden { display: none; }
  .setup-box { background: white; border-radius: 24px; padding: 2rem 1.8rem; max-width: 420px; width: 100%; text-align: center; }
  .setup-box h2 { font-size: 2rem; color: #085041; margin-bottom: .4rem; }
  .setup-box p { font-family: sans-serif; color: #555; font-size: .92rem; line-height: 1.55; margin-bottom: .75rem; }
  .setup-box .label { font-family: sans-serif; font-size: .8rem; color: #085041; font-weight: bold; text-align: left; display: block; margin-bottom: .3rem; margin-top: .9rem; }
  .setup-box input { width: 100%; border: 2px solid #9FE1CB; border-radius: 12px; padding: 12px 14px; font-size: .9rem; font-family: sans-serif; color: #085041; outline: none; }
  .setup-box input:focus { border-color: #1D9E75; }
  .setup-box .save-btn { background: #1D9E75; color: white; border: none; border-radius: 50px; padding: 12px 32px; font-family: "Fredoka One", cursive; font-size: 1.2rem; cursor: pointer; width: 100%; margin-top: 1.1rem; }
  .setup-box .err { font-family: sans-serif; font-size: .82rem; color: #E24B4A; min-height: 1.1em; margin-top: .4rem; }
  .setup-box .hint { font-family: sans-serif; font-size: .75rem; color: #aaa; margin-top: .75rem; line-height: 1.55; }
  .setup-box .reset-link { font-family: sans-serif; font-size: .75rem; color: #1D9E75; cursor: pointer; margin-top: .5rem; display: inline-block; text-decoration: underline; }

  /* Log Overlay */
  .log-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.92); display: flex; flex-direction: column; font-family: monospace; }
  .log-overlay.hidden { display: none; }
  .log-header { background: #085041; color: #9FE1CB; padding: .75rem 1rem; display: flex; justify-content: space-between; align-items: center; font-family: "Fredoka One", cursive; font-size: .95rem; flex-shrink: 0; }
  .log-header button { background: #E24B4A; color: white; border: none; border-radius: 8px; padding: 4px 14px; font-family: "Fredoka One", cursive; font-size: .9rem; cursor: pointer; }
  .log-filters { background: #04342C; padding: .4rem .75rem; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .log-filters button { border: none; border-radius: 20px; padding: 4px 12px; font-family: monospace; font-size: .72rem; cursor: pointer; opacity: .5; transition: opacity .15s; }
  .log-filters button.active { opacity: 1; }
  .log-filters .f-all   { background: #444;    color: #fff; }
  .log-filters .f-info  { background: #085041; color: #9FE1CB; }
  .log-filters .f-luis  { background: #0C447C; color: #B5D4F4; }
  .log-filters .f-blibu { background: #0F6E56; color: #9FE1CB; }
  .log-filters .f-error { background: #791F1F; color: #F09595; }
  .log-stats { background: #04342C; color: #5DCAA5; padding: .3rem 1rem; font-size: .72rem; display: flex; gap: 1.5rem; flex-shrink: 0; border-top: 1px solid #085041; }
  .log-body { flex: 1; overflow-y: auto; padding: .75rem 1rem; font-size: .76rem; color: #ccc; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  .log-entry { display: block; padding: 1px 0; }
  .log-entry.INFO  { color: #9FE1CB; }
  .log-entry.WARN  { color: #EF9F27; }
  .log-entry.ERROR { color: #F09595; font-weight: bold; }
  .log-entry.LUIS  { color: #85B7EB; }
  .log-entry.BLIBU { color: #5DCAA5; }
  .log-entry.hidden { display: none; }
  .log-footer { background: #085041; padding: .5rem 1rem; display: flex; gap: 8px; flex-shrink: 0; }
  .log-footer button { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 6px 16px; font-family: "Fredoka One", cursive; font-size: .85rem; cursor: pointer; }
</style>
</head>
<body>

<!-- Papa Setup Overlay -->
<div class="overlay" id="overlay">
  <div class="setup-box">
    <h2>Hallo Papa! 👋</h2>
    <p>Gib deine API Keys ein damit Bibu mit Luis sprechen kann.</p>

    <span class="label">🤖 OpenAI API Key (Whisper + GPT + Stimme)</span>
    <input type="password" id="openai-key-input" placeholder="sk-..."
      autocomplete="off" spellcheck="false"
      onkeydown="if(event.key==='Enter') saveKey()"/>

    <button class="save-btn" onclick="saveKey()">Bibu starten! 🚀</button>
    <div class="err" id="key-err"></div>
    <div class="hint">
      OpenAI Key: <strong>platform.openai.com</strong> → API keys<br>
      Der Key wird nur lokal auf diesem Gerät gespeichert.
    </div>
    <span class="reset-link" onclick="showResetConfirm()">Keys loeschen / aendern</span>
  </div>
</div>

<!-- Log Overlay — Papa öffnet mit Doppeltipp auf "Bibu" -->
<div class="log-overlay hidden" id="log-overlay">
  <div class="log-header">
    <span>Bibu Log</span>
    <button onclick="closeLog()">Schliessen</button>
  </div>
  <div class="log-filters">
    <button class="f-all active" onclick="setFilter('ALL')">Alle</button>
    <button class="f-info"       onclick="setFilter('INFO')">System</button>
    <button class="f-luis"       onclick="setFilter('LUIS')">Luis</button>
    <button class="f-blibu"      onclick="setFilter('BLIBU')">Bibu</button>
    <button class="f-error"      onclick="setFilter('ERROR')">Fehler</button>
  </div>
  <div class="log-stats" id="log-stats">Sessions: 0 | Luis: 0 | Bibu: 0 | Fehler: 0</div>
  <div class="log-body" id="log-body"></div>
  <div class="log-footer">
    <button onclick="copyLog()">Kopieren</button>
    <button onclick="clearLog()">Loeschen</button>
  </div>
</div>

<!-- Hauptapp -->
<div class="app" id="app">
  <div class="night-bg" id="night-bg">
    <div class="night-moon"></div>
    <div id="night-stars"></div>
  </div>
  <div class="talk-pill" id="talk-pill"></div>

  <div class="char" id="char" onclick="charTap()">
    <div class="char-rings" id="char-rings">
      <div class="char-ring"></div><div class="char-ring"></div><div class="char-ring"></div>
    </div>
    <svg class="bsvg" id="bsvg" viewBox="0 -14 200 274" xmlns="http://www.w3.org/2000/svg">
      <line x1="78" y1="36" x2="58" y2="8" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="54" cy="5" r="8" fill="#E24B4A"/>
      <line x1="122" y1="34" x2="145" y2="8" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="149" cy="5" r="7" fill="#EF9F27"/>
      <line x1="100" y1="28" x2="100" y2="4" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="100" cy="2" r="9" fill="#378ADD"/>
      <ellipse cx="100" cy="185" rx="60" ry="68" fill="#5DCAA5"/>
      <ellipse cx="100" cy="182" rx="55" ry="63" fill="#9FE1CB"/>
      <ellipse cx="100" cy="188" rx="32" ry="38" fill="white" opacity="0.25"/>
      <ellipse cx="100" cy="80" rx="54" ry="52" fill="#5DCAA5"/>
      <ellipse cx="100" cy="78" rx="49" ry="47" fill="#9FE1CB"/>
      <ellipse cx="79" cy="70" rx="17" ry="19" fill="white"/>
      <ellipse cx="121" cy="70" rx="17" ry="19" fill="white"/>
      <ellipse id="pl" cx="81" cy="72" rx="10" ry="11" fill="#085041"/>
      <ellipse id="pr" cx="123" cy="72" rx="10" ry="11" fill="#085041"/>
      <circle cx="85" cy="65" r="4" fill="white"/>
      <circle cx="127" cy="65" r="4" fill="white"/>
      <ellipse cx="60" cy="90" rx="13" ry="9" fill="#E24B4A" opacity="0.22"/>
      <ellipse cx="140" cy="90" rx="13" ry="9" fill="#E24B4A" opacity="0.22"/>
      <path id="lip-top"     d="M 80 101 Q 100 98 120 101"  fill="#085041"/>
      <path id="lip-bot"     d="M 80 101 Q 100 104 120 101" fill="#085041"/>
      <path id="mouth-inner" d="M 82 101 Q 100 101 118 101" fill="#3a2010"/>
      <path id="teeth-top"   d="M 84 101 Q 100 100 116 101 L 116 105 Q 100 104 84 105 Z" fill="white" opacity="0"/>
      <ellipse id="tongue"   cx="100" cy="112" rx="12" ry="5" fill="#E24B4A" opacity="0"/>
      <ellipse cx="42" cy="152" rx="13" ry="33" fill="#5DCAA5" transform="rotate(-18 42 152)"/>
      <ellipse cx="158" cy="152" rx="13" ry="33" fill="#5DCAA5" transform="rotate(18 158 152)"/>
      <ellipse cx="78" cy="242" rx="17" ry="21" fill="#1D9E75"/>
      <ellipse cx="122" cy="242" rx="17" ry="21" fill="#1D9E75"/>
      <ellipse cx="76" cy="257" rx="21" ry="10" fill="#085041"/>
      <ellipse cx="124" cy="257" rx="21" ry="10" fill="#085041"/>
      <!-- Schlaf-Augen (geschlossen) -->
      <ellipse class="eyelid" cx="79"  cy="70" rx="18" ry="20" fill="#9FE1CB"/>
      <ellipse class="eyelid" cx="121" cy="70" rx="18" ry="20" fill="#9FE1CB"/>
      <path class="eyelid" d="M 62 70 Q 79 80 96 70"  stroke="#085041" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path class="eyelid" d="M 104 70 Q 121 80 138 70" stroke="#085041" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="zzz-wrap" id="zzz-wrap">
      <span class="z z1">z</span><span class="z z2">Z</span><span class="z z3">z</span>
    </div>
  </div>

  <div class="sleep-wrap">
    <button class="sleep-btn" id="sleep-btn" onclick="toggleSession()">
      <svg id="sleep-icon" viewBox="0 0 24 24">
        <path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/>
      </svg>
    </button>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
